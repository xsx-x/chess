<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שחמט P2P - WebRTC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body>
    <div id="app">
        <h1>שחמט P2P ♟️</h1>
        
        <!-- מסך ראשי: יצירת משחק -->
        <div id="menu">
            <button id="create-btn">צור משחק חדש</button>
            <div id="invite-container" style="display:none;">
                <p>שלח את הקישור הזה ליריב:</p>
                <input type="text" id="invite-link" readonly dir="ltr">
                <button id="copy-btn">העתק קישור</button>
                <p id="waiting-msg" class="pulsate">ממתין להצטרפות היריב...</p>
            </div>
        </div>

        <!-- מסך משחק -->
        <div id="game-container" style="display:none;">
            <div id="status-box">
                <h3 id="status">מתחבר...</h3>
            </div>
            <div id="board" style="width: 100%; max-width: 400px; margin: auto;"></div>
            <button id="restart-btn" style="display:none; margin-top: 15px;">בקש משחק חדש</button>
        </div>
    </div>

    <!-- ספריות חיצוניות -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <!-- הלוגיקה שלנו -->
    <script src="app.js"></script>
</body>
</html>
