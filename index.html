<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שחמט P2P דרמטי ♟️</title>
    <!-- שים לב ששינינו ל v=5 -->
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="danger-overlay"></div> 

    <div id="app">
        <h1 class="glow-text">שחמט אונליין ⚡</h1>
        
        <!-- מסך ראשי -->
        <div id="menu">
            <div id="personal-stats" class="stats-box">
                📊 הסטטיסטיקה שלך: ניצחונות <span id="stat-w" class="win-text">0</span> | הפסדים <span id="stat-l" class="loss-text">0</span> | תיקו <span id="stat-d">0</span>
            </div>

            <button id="create-btn" class="neon-btn">⚔️ צור משחק קרב חדש</button>
            
            <div class="save-section">
                <p>יש לך קוד משחק שמור?</p>
                <input type="text" id="fen-input" placeholder="הדבק כאן את הקוד (FEN)..." dir="ltr">
                <select id="resume-color">
                    <option value="w">אני משחק בלבן</option>
                    <option value="b">אני משחק בשחור</option>
                </select>
                <button id="resume-btn" class="neon-btn blue">🔄 שחזר משחק</button>
            </div>

            <div id="invite-container" style="display:none;">
                <p>שלח את הקישור הזה ליריב:</p>
                <input type="text" id="invite-link" readonly dir="ltr">
                <button id="copy-btn" class="neon-btn green">העתק קישור</button>
                <p id="waiting-msg" class="pulsate">ממתין שהיריב יאזור אומץ ויכנס...</p>
            </div>
        </div>

        <!-- מסך משחק -->
        <div id="game-container" style="display:none;">
            <div id="status-box">
                <h3 id="status">מתחבר...</h3>
            </div>
            
            <div class="game-layout">
                <!-- הלוח -->
                <div id="board-wrapper">
                    <div id="board"></div>
                    <div class="controls">
                        <button id="restart-btn" class="neon-btn red" style="display:none;">בקש משחק חדש</button>
                        <button id="save-btn" class="neon-btn orange">💾 שמור משחק</button>
                    </div>
                </div>

                <!-- צדדים (צ'אט והיסטוריה) -->
                <div class="side-panel">
                    <div id="move-history" dir="ltr"></div>
                    
                    <div id="chat-box">
                        <div id="chat-messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" placeholder="כתוב הודעה ליריב...">
                            <button id="send-chat-btn">שלח</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- קרדיט המפתח -->
    <div class="creator-credit">
        נוצר על ידי <strong>לב טוב</strong> ✨ | צרו קשר: <a href="mailto:myylbwt@gmail.com">myylbwt@gmail.com</a>
    </div>

    <!-- ספריות חיצוניות -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <!-- פה אין צורך לשנות אם לא שינינו את הJS, אבל נעדכן גרסה כדי למנוע קאש מבלבל -->
    <script src="app.js?v=5"></script>
</body>
</html>
